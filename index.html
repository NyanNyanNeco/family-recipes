<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>家族のレシピ帳</title>
<!-- PWA -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="レシピ帳">
<meta name="theme-color" content="#f0a030">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#fdf8f0;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
.inp{border:1.5px solid #e0e0e0;border-radius:8px;padding:8px 12px;font-size:14px;width:100%;outline:none;background:#fff}
.inp:focus{border-color:#f0a030}
.btn{border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-weight:700;font-size:13px}
.lbl{display:flex;flex-direction:column;gap:5px;font-size:13px;font-weight:600;color:#555}
#loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
header{background:#fff;border-bottom:1px solid #f0e4cc;padding:0 18px;position:sticky;top:0;z-index:50}
.header-inner{max-width:820px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:54px}
main{max-width:820px;margin:0 auto;padding:18px 14px 80px}
.recipe-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#fff;border-radius:12px;border-left:4px solid #f0a030;box-shadow:0 1px 5px rgba(0,0,0,0.06);cursor:pointer;transition:background .15s}
.recipe-row:hover{background:#fffaf3}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:22px;width:100%;max-width:540px;max-height:92vh;overflow:auto;position:relative}
.tab-btn{flex:1;border:none;background:none;padding:9px 0;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;display:none;white-space:nowrap}
.step-bar{height:4px;border-radius:4px;margin-bottom:4px}
.cal-cell{background:#fff;border:1px solid #eee;border-radius:10px;padding:7px 5px;min-height:100px}
.cal-cell.today{border:2px solid #f0a030;background:#fff8ec}
.meal-slot{background:#f8f8f8;border:1px dashed #ddd;border-radius:6px;padding:3px 4px;margin-bottom:3px;cursor:pointer;font-size:10px;color:#ccc;text-align:center;min-height:24px}
.meal-slot.set{background:#fff0d0;border-color:#f0c060;color:#b07020}
.sync-badge{font-size:10px;margin-left:6px;font-weight:600;padding:1px 7px;border-radius:10px}
#member-bar::-webkit-scrollbar{display:none}
</style>
</head>
<body>

<div id="loading">
  <span style="font-size:48px">🍳</span>
  <div style="color:#c09040;font-weight:700;font-size:16px">読み込み中…</div>
</div>

<div id="app" style="display:none">
  <header>
    <div class="header-inner">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:22px">🍳</span>
        <div>
          <span style="font-weight:900;font-size:18px;color:#2a2a2a">家族のレシピ帳</span>
          <span id="save-badge" class="sync-badge" style="color:#4caf50;background:#f0fff4;border:1px solid #a5d6a7">👨‍👩‍👧‍👦 共有中</span>
        </div>
      </div>
      <div style="display:flex;gap:7px">
        <button id="btn-pwa-install" class="btn" onclick="doPWAInstall()" style="border-radius:20px;padding:6px 16px;background:#fff8ec;color:#f0a030;border:1.5px solid #f0a030;display:none;align-items:center;gap:4px">📲 アプリ化</button>
        <button id="btn-view-list" class="btn" onclick="setView('list')" style="border-radius:20px;padding:6px 16px">レシピ</button>
        <button id="btn-view-cal" class="btn" onclick="setView('calendar')" style="border-radius:20px;padding:6px 16px">カレンダー</button>
      </div>
    </div>
  </header>
  <main>
    <div id="view-list">
      <div id="member-bar" style="display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none"></div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <input id="search-inp" class="inp" placeholder="🔍 レシピ名・タグで検索…" oninput="renderList()" style="flex:1 1 160px">
        <select id="cat-filter" class="inp" onchange="renderList()" style="flex:0 0 auto;width:auto">
          <option value="すべて">📂 すべて</option>
        </select>
        <select id="sort-select" class="inp" onchange="renderList()" style="flex:0 0 auto;width:auto">
          <option value="default">⇅ 並び順</option>
          <option value="rating_desc">★ 評価が高い順</option>
          <option value="rating_asc">☆ 評価が低い順</option>
          <option value="time_asc">⏱ 調理時間が短い順</option>
          <option value="time_desc">⏱ 調理時間が長い順</option>
          <option value="title_asc">🔤 名前順（あ→ん）</option>
          <option value="new_desc">🆕 新着順</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
        <button class="btn" onclick="showForm()" style="background:#f0a030;color:#fff;border-radius:11px;padding:9px 18px;font-size:14px">＋ レシピを追加</button>
        <button class="btn" onclick="showImport('search')" style="background:#5060b0;color:#fff;border-radius:11px;padding:9px 18px;font-size:14px">🔍 レシピ検索</button>
        <button class="btn" onclick="doExport()" style="background:#fff;color:#666;border:1.5px solid #ddd;border-radius:11px;padding:9px 18px;font-size:14px">📤 エクスポート</button>
      </div>
      <div id="recipe-list"></div>
    </div>
    <div id="view-calendar" style="display:none"></div>
  </main>
</div>

<!-- Modals (empty shells, filled by JS) -->
<div id="modal-detail" class="modal-bg" style="display:none"><div class="modal" id="modal-detail-inner"></div></div>
<div id="modal-form"   class="modal-bg" style="display:none"><div class="modal" style="max-height:94vh" id="modal-form-inner"></div></div>
<div id="modal-import" class="modal-bg" style="display:none"><div class="modal" style="max-height:96vh" id="modal-import-inner"></div></div>
<div id="modal-export" class="modal-bg" style="display:none"><div class="modal" style="max-width:520px;padding:22px" id="modal-export-inner"></div></div>
<div id="modal-meal"   class="modal-bg" style="display:none"><div class="modal" style="max-width:320px;padding:20px;max-height:60vh" id="modal-meal-inner"></div></div>
<div id="toast"></div>
<button id="btn-back" onclick="goBack()" style="display:none;position:fixed;bottom:22px;left:16px;z-index:200;background:rgba(255,255,255,0.82);color:#aaa;border:1.5px solid #e0e0e0;border-radius:22px;padding:8px 18px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:opacity .2s">‹ 戻る</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase設定 ───────────────────────────────────────────────────────────
const FB_CONFIG = {
  apiKey: "AIzaSyCohHWnEwNagzCczhbkKQCh-pP0MUEf2MQ",
  authDomain: "family-recipes-8a276.firebaseapp.com",
  projectId: "family-recipes-8a276",
  storageBucket: "family-recipes-8a276.firebasestorage.app",
  messagingSenderId: "1091284732348",
  appId: "1:1091284732348:web:27d93e79441a0b0bcc83b9"
};
// ──────────────────────────────────────────────────────────────────────────

// ── 定数 ──────────────────────────────────────────────────────────────────
const DEFAULT_MEMBERS = ["みんな","パパ","ママ","太郎","花子"];
let MEMBERS = DEFAULT_MEMBERS.slice();
const CATS = ["ご飯もの","汁物・スープ","メイン料理","おかず","おつまみ","サラダ","デザート","和食","洋食","中華","イタリアン","アジア料理","その他"];
const CAT_GROUPS = [
  {label:"料理の種類", cats:CATS.slice(0,7)},
  {label:"料理の系統", cats:CATS.slice(7)}
];
const SAMPLES = [
  {id:"s1",title:"肉じゃが",cat:"おかず",img:"https://images.unsplash.com/photo-1547592180-85f173990554?w=400&q=80",
   desc:"ほっこり家庭の味",servings:4,time:35,
   ings:[{n:"じゃがいも",a:"4個"},{n:"牛肉",a:"200g"},{n:"玉ねぎ",a:"2個"},{n:"にんじん",a:"1本"}],
   seas:[{n:"醤油",a:"大さじ3"},{n:"みりん",a:"大さじ3"},{n:"砂糖",a:"大さじ2"},{n:"だし汁",a:"300ml"}],
   steps:["野菜を切る","牛肉を炒める","調味料を加えて煮込む","弱火で20分煮る"],
   ratings:{パパ:5,ママ:4,太郎:5,花子:3},tags:["定番","煮物"],favs:["パパ","太郎"],notes:"翌日が美味しい",createdAt:"2024-01-01T00:00:00.000Z"},
  {id:"s2",title:"ナポリタン",cat:"メイン料理",img:"https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=400&q=80",
   desc:"昭和の懐かしスパゲッティ",servings:2,time:20,
   ings:[{n:"スパゲッティ",a:"200g"},{n:"ウインナー",a:"4本"},{n:"玉ねぎ",a:"1/2個"},{n:"ピーマン",a:"2個"}],
   seas:[{n:"ケチャップ",a:"大さじ4"},{n:"バター",a:"15g"},{n:"塩こしょう",a:"適量"}],
   steps:["パスタを茹でる","野菜を炒める","ケチャップで絡める","バターで仕上げ"],
   ratings:{パパ:3,ママ:4,太郎:5,花子:5},tags:["パスタ","時短"],favs:["太郎","花子"],notes:"",createdAt:"2024-01-02T00:00:00.000Z"}
];

// ── 状態 ──────────────────────────────────────────────────────────────────
const S = { recipes:[], cal:{}, member:"みんな", view:"list", saving:false };
// 自分が最後にFirestoreに書いたバージョンを記録（onSnapshotの自己反応を無視するため）
let _myLastSaveVer = null;

// ── Firebase ──────────────────────────────────────────────────────────────
const USE_FB = !!(FB_CONFIG.apiKey && FB_CONFIG.projectId);
let db = null;
if (USE_FB) {
  db = getFirestore(initializeApp(FB_CONFIG));
}

// ── localStorage フォールバック ────────────────────────────────────────────
function lsGet(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

// ── 検索サイト定義（lsGet/lsSet定義直後に配置） ──────────────────────────
const DEFAULT_SITES=[
  {id:"cookpad",  name:"クックパッド",      icon:"🍳", color:"#f0a030", url:"https://cookpad.com/search/",                          hint:"日本最大のレシピ投稿サービス"},
  {id:"delish",   name:"デリッシュキッチン", icon:"🥗", color:"#f0a030", url:"https://delishkitchen.tv/search?q=",                   hint:"プロ監修の動画レシピ"},
  {id:"kurashiru",name:"クラシル",           icon:"🍜", color:"#f0a030", url:"https://www.kurashiru.com/search?query=",              hint:"動画で分かりやすいレシピ"},
  {id:"nhk",      name:"きょうの料理",       icon:"📺", color:"#f0a030", url:"https://www.kyounoryouri.jp/search/recipe?keyword=",   hint:"NHK公式レシピサイト"},
  {id:"sirogohan",name:"白ごはん.com",       icon:"🍚", color:"#f0a030", url:"https://www.sirogohan.com/search/?q=",                 hint:"丁寧なレシピと解説"},
  {id:"nadia",    name:"Nadia",              icon:"👩‍🍳", color:"#f0a030", url:"https://oceans-nadia.com/search?query=",       hint:"料理家・フードコーディネーターのレシピ"},
  {id:"erecipe",  name:"E・レシピ",          icon:"📋", color:"#f0a030", url:"https://erecipe.woman.excite.co.jp/search.html?q=",   hint:"管理栄養士監修レシピ"},
  {id:"google",   name:"Google検索",         icon:"🌐", color:"#f0a030", url:"https://www.google.com/search?q=レシピ+",             hint:"全ウェブからレシピを検索"},
];
var stored_sites = lsGet("custom_sites", null);
let RECIPE_SITES = (Array.isArray(stored_sites) && stored_sites.length > 0) ? stored_sites : DEFAULT_SITES.map(function(s){ return Object.assign({},s); });

async function saveSites() {
  lsSet("custom_sites", RECIPE_SITES);
  if (USE_FB) {
    try { await setDoc(doc(db,"family","sites"), {list: RECIPE_SITES}); } catch(e) { console.error(e); }
  }
  refreshSearchTabIfOpen();
}

// サイト編集後に開いている「レシピ検索」タブのサイト一覧を即時再描画する
function refreshSearchTabIfOpen() {
  const importModal = document.getElementById("modal-import");
  if (!importModal || importModal.style.display === "none") return;
  const content = document.getElementById("import-tab-content");
  if (!content || content.dataset.activeTab !== "search") return;
  content.innerHTML = "";
  buildSearchTab(content);
}

// ── メンバー編集 ──────────────────────────────────────────────────────────
async function saveMembers() {
  lsSet("members", MEMBERS);
  if (USE_FB) {
    S.saving = true;
    try { await setDoc(doc(db,"family","members"), {list: MEMBERS}); } catch(e) { console.error(e); }
    S.saving = false;
  }
}

window.showMemberEdit = function() {
  // モーダルがなければ作る
  let overlay = document.getElementById("modal-member");
  if (!overlay) {
    overlay = document.createElement("div");
    overlay.id = "modal-member";
    overlay.className = "modal-bg";
    overlay.style.display = "none";
    const inner = document.createElement("div");
    inner.className = "modal";
    inner.id = "modal-member-inner";
    inner.style.cssText = "max-width:360px;padding:24px";
    overlay.appendChild(inner);
    document.body.appendChild(overlay);
  }
  const el = document.getElementById("modal-member-inner");
  el.innerHTML = "";

  // ヘッダー
  const hdr = document.createElement("div");
  hdr.style.cssText = "display:flex;justify-content:space-between;align-items:center;margin-bottom:18px";
  hdr.innerHTML = '<span style="font-weight:700;font-size:17px">✏️ 家族の名前を編集</span>';
  const x = document.createElement("button");
  x.style.cssText = "background:#f0f0f0;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:15px";
  x.textContent = "✕";
  x.addEventListener("click", function(){ document.getElementById("modal-member").style.display="none"; });
  hdr.appendChild(x); el.appendChild(hdr);

  // 説明
  const desc = document.createElement("p");
  desc.style.cssText = "font-size:12px;color:#aaa;margin-bottom:14px";
  desc.textContent = "「みんな」は変更できません。名前をタップして編集してください。";
  el.appendChild(desc);

  // 入力フィールド一覧（「みんな」はスキップ）
  const fieldWrap = document.createElement("div");
  fieldWrap.style.cssText = "display:flex;flex-direction:column;gap:10px;margin-bottom:18px";
  MEMBERS.slice(1).forEach(function(m, idx) {
    const realIdx = idx + 1;
    const row = document.createElement("div");
    row.style.cssText = "display:flex;align-items:center;gap:8px";
    const label = document.createElement("span");
    label.style.cssText = "font-size:12px;color:#bbb;width:24px;text-align:right;flex-shrink:0";
    label.textContent = realIdx + ".";
    const inp = document.createElement("input");
    inp.className = "inp";
    inp.value = m;
    inp.maxLength = 10;
    inp.style.cssText = "flex:1;font-size:15px;padding:9px 12px";
    inp.dataset.idx = realIdx;
    row.appendChild(label); row.appendChild(inp);
    fieldWrap.appendChild(row);
  });
  el.appendChild(fieldWrap);

  // 保存ボタン
  const saveBtn = document.createElement("button");
  saveBtn.className = "btn";
  saveBtn.textContent = "💾 保存する";
  saveBtn.style.cssText = "width:100%;background:#f0a030;color:#fff;font-size:15px;padding:12px 0;border-radius:12px";
  saveBtn.addEventListener("click", async function() {
    const inputs = fieldWrap.querySelectorAll("input");
    const newNames = Array.from(inputs).map(function(inp){ return inp.value.trim(); });
    // バリデーション
    if (newNames.some(function(n){ return !n; })) {
      alert("名前を空にすることはできません"); return;
    }
    if (new Set(newNames).size !== newNames.length) {
      alert("同じ名前は使えません"); return;
    }
    // ratingsやfavs内の旧名前を新名前に置き換え
    const oldNames = MEMBERS.slice(1);
    oldNames.forEach(function(oldName, i) {
      const newName = newNames[i];
      if (oldName === newName) return;
      S.recipes.forEach(function(r) {
        // ratings
        if (r.ratings && r.ratings[oldName] != null) {
          r.ratings[newName] = r.ratings[oldName];
          delete r.ratings[oldName];
        }
        // favs
        if (r.favs) {
          r.favs = r.favs.map(function(f){ return f===oldName?newName:f; });
        }
      });
      // 現在選択中のメンバーも更新
      if (S.member === oldName) S.member = newName;
    });
    MEMBERS = ["みんな"].concat(newNames);
    await saveMembers();
    schedSave();
    document.getElementById("modal-member").style.display = "none";
    buildMemberBar();
    renderList();
    toast("家族の名前を更新しました");
  });
  el.appendChild(saveBtn);

  document.getElementById("modal-member").style.display = "flex";
};

// ── 読み込み ──────────────────────────────────────────────────────────────
async function loadData() {
  if (USE_FB) {
    try {
      const [rd, cd, md, sd] = await Promise.all([
        getDoc(doc(db,"family","recipes")),
        getDoc(doc(db,"family","calendar")),
        getDoc(doc(db,"family","members")),
        getDoc(doc(db,"family","sites"))
      ]);
      S.recipes = rd.exists() ? rd.data().list : SAMPLES;
      S.cal     = cd.exists() ? cd.data().map  : {};
      MEMBERS   = md.exists() ? md.data().list : DEFAULT_MEMBERS.slice();
      if (sd.exists()) { RECIPE_SITES = sd.data().list; lsSet("custom_sites", RECIPE_SITES); }
      setBadge("👨‍👩‍👧‍👦 共有中","#4caf50","#f0fff4","#a5d6a7");
      // リアルタイム同期
      // 初回はgetDocで取得済みのため、onSnapshotの最初の発火（初期配信）はスキップ
      let _recipesSnapFirst = true;
      onSnapshot(doc(db,"family","recipes"), snap => {
        if (!snap.exists()) return;
        // 初回配信はスキップ（getDocで既に読み込み済み）
        if (_recipesSnapFirst) { _recipesSnapFirst = false; return; }
        const data = snap.data();
        // 自分自身の書き込みによる通知はスキップ
        if (data._ver && data._ver === _myLastSaveVer) return;
        if (S.saving) return;
        S.recipes = data.list;
        var t=new Date().toISOString(); var ns=false;
        S.recipes.forEach(function(r){ if(!r.createdAt){r.createdAt=t;ns=true;} });
        if(ns) schedSave();
        renderAll();
      });
      onSnapshot(doc(db,"family","calendar"), snap => {
        if (snap.exists() && !S.saving) { S.cal = snap.data().map; if(S.view==="calendar") renderCalendar(); }
      });
      onSnapshot(doc(db,"family","members"), snap => {
        if (snap.exists() && !S.saving) { MEMBERS = snap.data().list; buildMemberBar(); }
      });
      onSnapshot(doc(db,"family","sites"), snap => {
        if (snap.exists() && !S.saving) { RECIPE_SITES = snap.data().list; lsSet("custom_sites", RECIPE_SITES); }
      });
    } catch(e) {
      console.error("Firebase error:", e);
      S.recipes = lsGet("recipes", SAMPLES);
      S.cal     = lsGet("calendar", {});
      MEMBERS   = lsGet("members", DEFAULT_MEMBERS.slice());
      setBadge("⚠️ オフライン","#e05555","#fff0f0","#f0a0a0");
    }
  } else {
    S.recipes = lsGet("recipes", SAMPLES);
    S.cal     = lsGet("calendar", {});
    MEMBERS   = lsGet("members", DEFAULT_MEMBERS.slice());
    setBadge("💾 ローカル","#5060b0","#eef0ff","#c0c8f0");
  }
  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "block";
  // UI状態を復元（buildCatFilter より先に呼ぶ）
  restoreUIState();
  // createdAt が未設定のレシピに今日の日付を補完して保存
  const today = new Date().toISOString();
  let needsSave = false;
  S.recipes.forEach(function(r) {
    if (!r.createdAt) { r.createdAt = today; needsSave = true; }
  });
  if (needsSave) schedSave();
  buildCatFilter();
  buildMemberBar();
  // 保存されていたビューに切り替え
  if (S._restoreView && S._restoreView !== "list") {
    setView(S._restoreView);
  } else {
    renderAll();
  }
  S._restoreView = null;
}

// ── 保存 ──────────────────────────────────────────────────────────────────
let saveTimer = null;
function schedSave() { clearTimeout(saveTimer); S.saving = true; saveTimer = setTimeout(doSave, 800); }
async function doSave() {
  S.saving = true;
  setBadge("⏳ 保存中…","#f0a030","#fff8ec","#f0e0a0");
  // まずlocalStorageに確実に保存（オフライン時のフォールバック）
  lsSet("recipes", S.recipes);
  if (USE_FB) {
    // 自分の書き込みを識別するバージョン番号を付与
    const ver = Date.now().toString(36) + Math.random().toString(36).slice(2);
    _myLastSaveVer = ver;
    try {
      await setDoc(doc(db,"family","recipes"), {list: S.recipes, _ver: ver});
      // 保存成功：onSnapshotが自己反応しても_myLastSaveVerで防御済み
    } catch(e) {
      console.error("Firestore保存エラー:", e);
      // 保存失敗時もverを保持しておく（onSnapshotによる上書きを防ぐ）
      // S.recipesはlocalStorageに保存済みなので消えない
      setBadge("⚠️ 保存失敗","#e05555","#fff0f0","#f0a0a0");
      S.saving = false;
      return;
    }
  }
  S.saving = false;
  setBadge(USE_FB ? "✅ 保存済" : "💾 保存済","#4caf50","#f0fff4","#a5d6a7");
}
async function saveCalendar() {
  lsSet("calendar", S.cal);
  if (USE_FB) {
    try { await setDoc(doc(db,"family","calendar"), {map: S.cal}); } catch(e) { console.error(e); }
  }
}

// ── ヘルパー ──────────────────────────────────────────────────────────────
function setBadge(txt, col, bg, border) {
  const b = document.getElementById("save-badge");
  b.textContent = txt; b.style.color = col; b.style.background = bg; b.style.border = "1px solid " + border;
}
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(t._t); t._t = setTimeout(() => t.style.display="none", 2200);
}
function avgRating(r) {
  const vals = Object.values(r.ratings || {});
  return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
}
function starsHTML(v, sz) {
  sz = sz || 14;
  let s = "";
  for (let i=1;i<=5;i++) s += '<span style="color:#f0a030;font-size:'+sz+'px">'+(i<=v?"★":"☆")+'</span>';
  return s;
}
function makeStarNodes(v, sz, onClick) {
  const wrap = document.createElement("span");
  for (let i=1;i<=5;i++) {
    const s = document.createElement("span");
    s.textContent = i<=v ? "★" : "☆";
    s.style.cssText = "color:#f0a030;font-size:"+sz+"px;cursor:"+(onClick?"pointer":"default");
    if (onClick) { (function(score){ s.addEventListener("click", ()=>onClick(score)); })(i); }
    wrap.appendChild(s);
  }
  return wrap;
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function saveUIState() {
  lsSet("ui_sort",   document.getElementById("sort-select").value);
  lsSet("ui_cat",    document.getElementById("cat-filter").value);
  lsSet("ui_search", document.getElementById("search-inp").value);

function restoreUIState() {
  const sort   = lsGet("ui_sort",   "default");

  // sort と search はここで反映（cat はビルド後に反映）
  document.getElementById("sort-select").value = sort;
  document.getElementById("search-inp").value  = search;

  S._restoreCat = lsGet("ui_cat", "すべて");

// ── カテゴリフィルタ構築 ───────────────────────────────────────────────────
function buildCatFilter() {
  const sel = document.getElementById("cat-filter");
  CAT_GROUPS.forEach(function(g) {
    const og = document.createElement("optgroup");
    og.label = "▼ " + g.label;
    g.cats.forEach(function(c) {
      const o = document.createElement("option");
      o.value = c; o.textContent = c; og.appendChild(o);
    });
    sel.appendChild(og);
  });
  // 保存されていたカテゴリを復元
  if (S._restoreCat) {
    sel.value = S._restoreCat;
    S._restoreCat = null;
  }
}

// ── レシピ一覧 ─────────────────────────────────────────────────────────────
function getFiltered() {
  const q    = (document.getElementById("search-inp").value || "").normalize("NFKC").toLowerCase();
  const cat  = document.getElementById("cat-filter").value;
  const sort = document.getElementById("sort-select") ? document.getElementById("sort-select").value : "default";

  let list = S.recipes.filter(function(r) {
    if (S.member !== "みんな" && !(r.ratings && r.ratings[S.member] != null)) return false;
    if (cat !== "すべて" && r.cat !== cat) return false;
    if (q) {
      const title = (r.title||"").normalize("NFKC").toLowerCase();
      const tags  = (r.tags||[]).map(function(t){ return t.normalize("NFKC").toLowerCase(); }).join(" ");
      if (!title.includes(q) && !tags.includes(q)) return false;
    }
    return true;
  });

  function memberRating(r) {
    if (S.member !== "みんな") return (r.ratings && r.ratings[S.member] != null) ? r.ratings[S.member] : 0;
    return avgRating(r);
  }

  if (sort === "rating_desc") list.sort(function(a,b){ return memberRating(b)-memberRating(a); });
  else if (sort === "rating_asc") list.sort(function(a,b){ return memberRating(a)-memberRating(b); });
  else if (sort === "time_asc")   list.sort(function(a,b){ return (a.time||0)-(b.time||0); });
  else if (sort === "time_desc")  list.sort(function(a,b){ return (b.time||0)-(a.time||0); });
  else if (sort === "title_asc")  list.sort(function(a,b){ return (a.title||"").localeCompare(b.title||"","ja"); });
  else if (sort === "new_desc")   list.sort(function(a,b){ return ((b.createdAt||b.id)||"").localeCompare((a.createdAt||a.id)||""); });

  return list;
}

window.renderList = function() {
  saveUIState();
  const el  = document.getElementById("recipe-list");
  const cat = document.getElementById("cat-filter").value;
  const filtered = getFiltered();
  el.innerHTML = "";

  if (!filtered.length) {
    const div = document.createElement("div");
    div.style.cssText = "text-align:center;padding:60px 0;color:#bbb";
    div.innerHTML = '<div style="font-size:48px">🍽</div>'
      + '<div style="font-size:16px;margin-top:10px">'+(S.recipes.length===0?"まだレシピがありません":"レシピが見つかりません")+'</div>';
    if (S.recipes.length === 0) {
      const btn = document.createElement("button");
      btn.className="btn"; btn.textContent="＋ 最初のレシピを登録";
      btn.style.cssText="background:#f0a030;color:#fff;margin-top:16px;border-radius:20px;padding:8px 20px";
      btn.addEventListener("click", showForm);
      div.appendChild(btn);
    }
    el.appendChild(div);
    return;
  }

  const sort = document.getElementById("sort-select") ? document.getElementById("sort-select").value : "default";
  if (cat !== "すべて" || sort !== "default") {
    const list = document.createElement("div");
    list.style.cssText = "display:flex;flex-direction:column;gap:6px";
    filtered.forEach(function(r){ list.appendChild(makeRow(r)); });
    el.appendChild(list);
    return;
  }

  CAT_GROUPS.forEach(function(g) {
    const subs = g.cats.map(function(c){ return {cat:c, items:filtered.filter(function(r){ return r.cat===c; })}; }).filter(function(s){ return s.items.length>0; });
    if (!subs.length) return;
    const gDiv = document.createElement("div");
    gDiv.style.marginBottom = "24px";
    const gLbl = document.createElement("div");
    gLbl.style.cssText = "font-size:11px;font-weight:700;color:#bbb;letter-spacing:1px;margin-bottom:10px;padding-left:2px";
    gLbl.textContent = "◆ " + g.label;
    gDiv.appendChild(gLbl);
    subs.forEach(function(s) {
      const sDiv = document.createElement("div");
      sDiv.style.marginBottom = "16px";
      const sHdr = document.createElement("div");
      sHdr.style.cssText = "display:flex;align-items:center;gap:8px;margin-bottom:7px";
      sHdr.innerHTML = '<span style="background:#fff0d0;color:#b07020;font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px">'+escHtml(s.cat)+'</span>'
        + '<span style="color:#ccc;font-size:12px">'+s.items.length+'件</span>';
      sDiv.appendChild(sHdr);
      const list = document.createElement("div");
      list.style.cssText = "display:flex;flex-direction:column;gap:6px";
      s.items.forEach(function(r){ list.appendChild(makeRow(r)); });
      sDiv.appendChild(list);
      gDiv.appendChild(sDiv);
    });
    el.appendChild(gDiv);
  });
};

function makeRow(r) {
  const a = avgRating(r);
  const v = S.member !== "みんな" ? (r.ratings && r.ratings[S.member] != null ? r.ratings[S.member] : a) : a;
  const div = document.createElement("div");
  div.className = "recipe-row";
  div.innerHTML =
    '<div style="width:52px;height:52px;border-radius:9px;overflow:hidden;flex-shrink:0;background:#f0ece4">'
      + (r.img ? '<img src="'+escHtml(r.img)+'" style="width:100%;height:100%;object-fit:cover">'
                : '<div style="height:100%;display:flex;align-items:center;justify-content:center;font-size:22px">🍽</div>')
    + '</div>'
    + '<div style="flex:1;min-width:0">'
      + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'
        + '<span style="background:#fff0d0;color:#b07020;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0">'+escHtml(r.cat)+'</span>'
        + '<span style="font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escHtml(r.title)+'</span>'
        + ((r.favs||[]).includes(S.member) && S.member!=="みんな" ? '<span style="font-size:12px">❤️</span>' : '')
      + '</div>'
      + '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">'
        + starsHTML(v,14)
        + '<span style="color:#aaa;font-size:11px">🕐'+r.time+'分</span>'
        + '<span style="color:#aaa;font-size:11px">👥'+r.servings+'人</span>'
        + (r.createdAt ? '<span style="color:#c0b090;font-size:10px">📅'+r.createdAt.slice(0,10).replace(/-/g,"/")+'</span>' : '')
        + (r.tags||[]).slice(0,2).map(function(t){ return '<span style="background:#eef0ff;color:#5060b0;font-size:10px;padding:1px 7px;border-radius:20px">'+escHtml(t)+'</span>'; }).join("")
      + '</div>'
    + '</div>'
    + '<span style="color:#ccc;font-size:18px">›</span>';
  div.addEventListener("click", function(){ openDetail(r); });
  return div;
}

function openDetail(r) {
  renderDetail(r);
  document.getElementById("modal-detail").style.display = "flex";
}
function renderDetail(r) {
  const el  = document.getElementById("modal-detail-inner");
  const a   = avgRating(r);
  const v   = S.member !== "みんな" ? (r.ratings && r.ratings[S.member] != null ? r.ratings[S.member] : 0) : a;
  el.innerHTML = "";

  // ヘッダー画像エリア
  const hdr = document.createElement("div");
  hdr.style.position = "relative";
  if (r.img) {
    hdr.innerHTML = '<div style="height:190px;overflow:hidden;border-radius:22px 22px 0 0"><img src="'+escHtml(r.img)+'" style="width:100%;height:100%;object-fit:cover"></div>';
  } else {
    hdr.innerHTML = '<div style="height:80px;background:#fdf8f0;border-radius:22px 22px 0 0;display:flex;align-items:center;justify-content:center"><span style="font-size:40px;color:#ddd">🍽</span></div>';
  }
  // 写真変更ボタン
  const photoLabel = document.createElement("label");
  photoLabel.style.cssText = "position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,0.55);color:#fff;border:none;border-radius:20px;padding:5px 14px;cursor:pointer;font-weight:700;font-size:12px";
  photoLabel.innerHTML = '📁 '+(r.img?"写真を変更":"写真を追加");
  const photoInput = document.createElement("input");
  photoInput.type="file"; photoInput.accept="image/*"; photoInput.style.display="none";
  photoInput.addEventListener("change", function(){ changePhoto(r.id, this); });
  photoLabel.appendChild(photoInput);
  hdr.appendChild(photoLabel);
  // 閉じるボタン
  const closeBtn = document.createElement("button");
  closeBtn.textContent = "✕";

  closeBtn.addEventListener("click", function(){ document.getElementById("modal-detail").style.display="none"; });
  hdr.appendChild(closeBtn);
  el.appendChild(hdr);

  // 本文
  const body = document.createElement("div");
  body.style.cssText = "padding:18px 22px 28px";

  // タイトル行
  const titleRow = document.createElement("div");
  titleRow.style.cssText = "display:flex;justify-content:space-between;align-items:flex-start";
  const titleLeft = document.createElement("div");
  titleLeft.innerHTML = '<span style="background:#fff0d0;color:#b07020;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px">'+escHtml(r.cat)+'</span>'
    + '<h2 style="margin:8px 0 4px;font-size:21px">'+escHtml(r.title)+'</h2>'
    + '<div style="color:#888;font-size:13px">🕐'+r.time+'分 ／ 👥'+r.servings+'人分'+(r.createdAt ? ' ／ 📅'+r.createdAt.slice(0,10).replace(/-/g,"/") : '')+(r.updatedAt ? ' ／ ✏️'+r.updatedAt.slice(0,10).replace(/-/g,"/") : '')+'</div>';
  titleRow.appendChild(titleLeft);

  // 星評価エリア
  const starArea = document.createElement("div");
  starArea.style.textAlign = "center";
  const starLbl = document.createElement("div");
  starLbl.style.cssText = "font-size:11px;color:#aaa;margin-bottom:3px";
  starLbl.textContent = S.member !== "みんな" ? S.member+"の評価" : "平均評価";
  starArea.appendChild(starLbl);
  const starNodes = document.createElement("span"); starNodes.appendChild(makeStarNodes(v, 22, S.member !== "みんな" ? function(score){ doRate(r.id, S.member, score); r.ratings=r.ratings||{}; r.ratings[S.member]=score; renderAllStars&&renderAllStars(); } : null));
  starArea.appendChild(starNodes);
  titleRow.appendChild(starArea);
  body.appendChild(titleRow);

  if (r.desc) {
    const p = document.createElement("p");
    p.style.cssText = "color:#555;font-size:14px;line-height:1.7;margin-top:10px";
    p.textContent = r.desc;

    allStars.innerHTML = "";

  const editBtn2 = document.createElement("button");
  editBtn2.className="btn"; editBtn2.textContent="✏️ 編集";

    document.getElementById("modal-detail").style.display="none";

  });

  delBtn.className="btn"; delBtn.textContent="🗑 削除";
  delBtn.style.cssText="flex:1;background:#fff0f0;color:#e05555;border-radius:10px;padding:10px 0";
  delBtn.addEventListener("click", function(){
    if (!confirm("削除しますか？")) return;
    S.recipes = S.recipes.filter(function(x){ return x.id!==r.id; });
    document.getElementById("modal-detail").style.display="none";
    schedSave(); renderList();
  });
  actions.appendChild(editBtn2); actions.appendChild(delBtn);
  body.appendChild(actions);
  el.appendChild(body);
}
function renderTab(t, r, el) {
  el.innerHTML = "";
  const wrap = document.createElement("div");
  wrap.style.marginTop = "14px";
  if (t === "食材") {
    function makeIngList(arr, ttl) {
      const d = document.createElement("div");
      d.innerHTML = '<div style="font-weight:700;font-size:12px;color:#888;margin-bottom:6px">'+ttl+'</div>';
      (arr||[]).forEach(function(x) {
        if (x._isGroup) {
          const grpHdr = document.createElement("div");
          grpHdr.style.cssText = "font-size:12px;font-weight:700;color:#5060b0;background:#eef0ff;padding:3px 8px;border-radius:6px;margin:8px 0 4px";
          grpHdr.textContent = x.grp || "グループ";
          d.appendChild(grpHdr);
          return;
        }
        const row = document.createElement("div");
        row.style.cssText = "display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:14px";
        row.innerHTML = '<span>'+escHtml(x.n)+'</span><span style="color:#888">'+escHtml(x.a)+'</span>';
        d.appendChild(row);
      });
      return d;
    }
    wrap.appendChild(makeIngList(r.ings,"🥕 食材"));
    const sep = document.createElement("div"); sep.style.marginTop="14px";
    sep.appendChild(makeIngList(r.seas,"🧂 調味料"));
    wrap.appendChild(sep);
  } else if (t === "手順") {
    (r.steps||[]).forEach(function(s,i) {

// ── ImgBB へ画像をアップロードしてURLを返す ─────────────────────────────
const IMGBB_API_KEY = "36334d1548319441661c9278cbc72586";
async function uploadImageToImgBB(file) {
  return new Promise(function(resolve, reject) {
    const rd = new FileReader();
    rd.onload = function(ev) {
      const im = new Image();
      im.onload = function() {
        const sc = Math.min(1, 1200 / Math.max(im.width, im.height));
        const c = document.createElement("canvas");
        c.width = Math.round(im.width * sc);
        c.height = Math.round(im.height * sc);
        c.getContext("2d").drawImage(im, 0, 0, c.width, c.height);
        c.toBlob(async function(blob) {
          if (!blob) { reject(new Error("canvas toBlob failed")); return; }
          try {
            const form = new FormData();
            form.append("image", blob, "recipe.jpg");
            const res = await fetch(
              "https://api.imgbb.com/1/upload?key=" + IMGBB_API_KEY,
              { method: "POST", body: form }
            );
            const json = await res.json();
            if (json.success) {
              resolve(json.data.url);
            } else {
              reject(new Error(JSON.stringify(json)));
            }
          } catch(e) { reject(e); }
        }, "image/jpeg", 0.82);
      };
      im.onerror = function() { reject(new Error("image load failed")); };
      im.src = ev.target.result;
    };
    rd.onerror = function() { reject(new Error("file read failed")); };
    rd.readAsDataURL(file);
  });
}

// ── ドラッグ並び替えユーティリティ ──────────────────────────────────────
function enableDragSort(container, getArr, setArr, onUpdate) {
  var dragIdx = null;
  function getRows() { return Array.from(container.querySelectorAll("[data-drag-idx]")); }

  container.addEventListener("dragstart", function(e) {
    var row = e.target.closest("[data-drag-idx]");
    if (!row) return;
    dragIdx = parseInt(row.dataset.dragIdx);
    e.dataTransfer.effectAllowed = "move";
    setTimeout(function(){ row.style.opacity="0.4"; }, 0);
  });
  container.addEventListener("dragend", function(e) {
    var row = e.target.closest("[data-drag-idx]");
    if (row) row.style.opacity="1";
    dragIdx = null;
  });
  container.addEventListener("dragover", function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    var row = e.target.closest("[data-drag-idx]");
    if (!row || dragIdx === null) return;
    var overIdx = parseInt(row.dataset.dragIdx);
    if (overIdx === dragIdx) return;
    var arr = getArr();
    var moved = arr.splice(dragIdx, 1)[0];
    arr.splice(overIdx, 0, moved);
    setArr(arr);
    dragIdx = overIdx;
    onUpdate();
  });
  // タッチ対応（簡易）
  var touchDragIdx = null, touchClone = null;
  container.addEventListener("touchstart", function(e) {
    var row = e.target.closest("[data-drag-idx]");
    if (!e.target.closest(".drag-handle")) return;
    touchDragIdx = parseInt(row.dataset.dragIdx);
    row.style.opacity = "0.4";
    e.preventDefault();
  }, {passive:false});
  container.addEventListener("touchmove", function(e) {
    if (touchDragIdx === null) return;
    e.preventDefault();
    var touch = e.touches[0];
    var el = document.elementFromPoint(touch.clientX, touch.clientY);
    var row = el && el.closest("[data-drag-idx]");
    if (!row) return;
    var overIdx = parseInt(row.dataset.dragIdx);
    if (overIdx === touchDragIdx) return;
    var arr = getArr();
    var moved = arr.splice(touchDragIdx, 1)[0];
    arr.splice(overIdx, 0, moved);
    setArr(arr);
    touchDragIdx = overIdx;
    onUpdate();
  }, {passive:false});
  container.addEventListener("touchend", function(e) {
    if (touchDragIdx === null) return;
    var rows = getRows();
    rows.forEach(function(r){ r.style.opacity="1"; });
    touchDragIdx = null;
    onUpdate();
  });
}

// ── CSVパース（引用符内改行対応） ─────────────────────────────────────────
function parseCSVFull(text) {
  // 文字列全体を1文字ずつ走査してセルに分解（引用符内の改行・カンマを正しく扱う）
  const rows=[]; let row=[], cur="", inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){
      if(inQ && text[i+1]==='"'){ cur+='"'; i++; } // エスケープ ""
      else inQ=!inQ;
    } else if(c===','&&!inQ){
      row.push(cur); cur="";
    } else if((c==='\n'||(c==='\r'&&text[i+1]==='\n'))&&!inQ){
      if(c==='\r') i++;
      row.push(cur); rows.push(row); row=[]; cur="";
    } else {
      cur+=c;
    }
  }
  if(cur||row.length) { row.push(cur); rows.push(row); }
  return rows;
}

function csvToRecipes(text) {
  text=text.replace(/^\uFEFF/,""); // BOM除去
  const allRows=parseCSVFull(text);
  if(allRows.length<2) throw new Error("データが空です");
  const headers=allRows[0].map(function(h){ return h.trim(); });

  // 食材・調味料・手順はセミコロン区切り
  function splitSemi(s){ return s?s.split(";").map(function(x){return x.trim();}).filter(Boolean):[]; }
  function parsePairs(s){
    return splitSemi(s).map(function(item){
      const p=item.lastIndexOf(":");
      if(p===-1) return {n:item,a:""};
      const n=item.slice(0,p).trim(), a=item.slice(p+1).trim();
      // undefinedの文字列を除去
      if(n==="undefined"||a==="undefined"||!n) return null;
      return {n:n, a:a==="undefined"?"":a};
    }).filter(Boolean);
  }

  const recipes=[];
  for(let i=1;i<allRows.length;i++){
    const vals=allRows[i];
    const row={};
    headers.forEach(function(h,j){ row[h]=(vals[j]||"").trim(); });
    if(!row["レシピ名"]) continue;

    recipes.push({
      title:   row["レシピ名"],
      cat:     row["カテゴリ"]||"その他",
      desc:    row["説明"]||"",
      servings:parseInt(row["人数"])||2,
      time:    parseInt(row["調理時間(分)"])||0,
      ings:    parsePairs(row["食材(名前:量;名前:量)"]),
      seas:    parsePairs(row["調味料(名前:量;名前:量)"]),
      steps:   splitSemi(row["手順(セミコロン区切り)"]),
      tags:    splitSemi(row["タグ(セミコロン区切り)"]),
      notes:   row["メモ"]||"",
      ref:     row["参考サイト"]||"",
      img:"", ratings:{}, favs:[]
    });
  }
  return recipes;
}

// ── エクスポート ───────────────────────────────────────────────────────────
function recipesToCsv(recipes) {
  const BOM = "\uFEFF";
  const header = ["レシピ名","カテゴリ","説明","人数","調理時間(分)","食材(名前:量;名前:量)","調味料(名前:量;名前:量)","手順(セミコロン区切り)","タグ(セミコロン区切り)","メモ","参考サイト"];
  function csvCell(v) { return '"' + String(v==null?"":v).replace(/"/g,'""') + '"'; }
  // _isGroupはCSV上スキップ（グループ名は出力しない）
  function pairsToStr(arr){ return (arr||[]).filter(function(i){return !i._isGroup&&i.n;}).map(function(i){ return i.n+":"+i.a; }).join(";"); }
  const rows = recipes.map(function(r) {
    return [
      r.title||"",
      r.cat||"",
      r.desc||"",
      r.servings!=null?r.servings:"",
      r.time!=null?r.time:"",
      pairsToStr(r.ings),
      pairsToStr(r.seas),
      (r.steps||[]).join(";"),
      (r.tags||[]).join(";"),
      r.notes||"",
      r.ref||""
    ].map(csvCell).join(",");
  });
  return BOM + header.map(csvCell).join(",") + "\n" + rows.join("\n");
}

// ── カレンダー ─────────────────────────────────────────────────────────────
let calBase = new Date();
function renderCalendar() {
  const el=document.getElementById("view-calendar"); el.innerHTML="";
  const today=new Date();
  const DAY=["月","火","水","木","金","土","日"];
  const base=new Date(calBase);
  const dow=base.getDay();
  base.setDate(base.getDate()+(dow===0?-6:1-dow));
  const week=[];
  for(var i=0;i<7;i++){ week.push(new Date(base)); base.setDate(base.getDate()+1); }
  function fmt(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  const todayStr=fmt(today);

  const topRow=document.createElement("div"); topRow.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px";
  const h=document.createElement("h2"); h.style.cssText="margin:0;font-size:19px"; h.textContent="📅 献立カレンダー";
  topRow.appendChild(h);
  const btns=document.createElement("div"); btns.style.cssText="display:flex;gap:7px";
  const prev=document.createElement("button"); prev.className="btn"; prev.textContent="◀"; prev.style.cssText="background:#f0f0f0;color:#555";
  prev.addEventListener("click", function(){ calBase.setDate(calBase.getDate()-7); renderCalendar(); });
  const next=document.createElement("button"); next.className="btn"; next.textContent="▶"; next.style.cssText="background:#f0f0f0;color:#555";
  next.addEventListener("click", function(){ calBase.setDate(calBase.getDate()+7); renderCalendar(); });
  const shop=document.createElement("button"); shop.className="btn"; shop.textContent="🛒 買い物リスト"; shop.style.cssText="background:#4caf50;color:#fff";
  shop.addEventListener("click", function() {
    const ids=new Set(Object.values(S.cal).flatMap(function(v){ return [v.lunch,v.dinner].filter(Boolean); }));
    const items=[];
    ids.forEach(function(id){ const r=S.recipes.find(function(x){ return x.id===id; }); if(r)(r.ings||[]).forEach(function(i){ items.push(r.title+"｜"+i.n+" "+i.a); }); });
    if(!items.length){alert("献立が設定されていません");return;}
    alert("🛒 買い物リスト\n\n"+items.join("\n"));
  });
  btns.appendChild(prev); btns.appendChild(next); btns.appendChild(shop);
  topRow.appendChild(btns); el.appendChild(topRow);

  const grid=document.createElement("div"); grid.style.cssText="display:grid;grid-template-columns:repeat(7,1fr);gap:5px";
  week.forEach(function(date,i) {
    const key=fmt(date), isT=key===todayStr, entry=S.cal[key]||{};
    const cell=document.createElement("div"); cell.className="cal-cell"+(isT?" today":"");
    const dHdr=document.createElement("div"); dHdr.style.cssText="text-align:center;margin-bottom:5px";
    dHdr.innerHTML='<div style="font-size:10px;color:#bbb">'+DAY[i]+'</div><div style="font-weight:700;font-size:14px;color:'+(isT?"#f0a030":"#333")+'">'+date.getDate()+'</div>';
    cell.appendChild(dHdr);
    ["lunch","dinner"].forEach(function(meal) {
      const r=S.recipes.find(function(x){ return x.id===entry[meal]; });
      const slot=document.createElement("div"); slot.className="meal-slot"+(r?" set":"");
      slot.textContent=(meal==="lunch"?"昼":"夜")+": "+(r?r.title:"未定");
      slot.addEventListener("click", function(){ openMealPicker(key,meal); });
      cell.appendChild(slot);
    });
    grid.appendChild(cell);
  });
  el.appendChild(grid);
}

function openMealPicker(key, meal) {
  const el=document.getElementById("modal-meal-inner"); el.innerHTML="";
  const h=document.createElement("h3"); h.style.cssText="margin:0 0 14px;font-size:16px"; h.textContent=key+" "+(meal==="lunch"?"昼食":"夕食");
  el.appendChild(h);
  const list=document.createElement("div"); list.style.cssText="display:flex;flex-direction:column;gap:6px";
  const clr=document.createElement("button"); clr.className="btn"; clr.textContent="🚫 クリア"; clr.style.cssText="background:#f0f0f0;color:#888;text-align:left;padding:10px 14px;border-radius:10px";
  clr.addEventListener("click", function(){ setMeal(key,meal,null); });
  list.appendChild(clr);
  S.recipes.forEach(function(r) {
    const btn=document.createElement("button"); btn.style.cssText="background:#fff;border:1.5px solid #eee;border-radius:10px;padding:9px 14px;cursor:pointer;text-align:left;font-size:14px;color:#333;font-family:inherit";
    btn.innerHTML='<span style="background:#fff0d0;color:#b07020;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;margin-right:8px">'+escHtml(r.cat)+'</span>'+escHtml(r.title);
    btn.addEventListener("click", function(){ setMeal(key,meal,r.id); });
    list.appendChild(btn);
  });
  el.appendChild(list);
  const cancel=document.createElement("button"); cancel.style.cssText="width:100%;margin-top:12px;background:#f0f0f0;border:none;border-radius:10px;padding:10px 0;cursor:pointer;color:#666;font-family:inherit"; cancel.textContent="キャンセル";
  cancel.addEventListener("click", function(){ document.getElementById("modal-meal").style.display="none"; });
  el.appendChild(cancel);
  document.getElementById("modal-meal").style.display="flex";
}
function setMeal(key,meal,id) {
  if(!S.cal[key]) S.cal[key]={};
  if(id===null) delete S.cal[key][meal]; else S.cal[key][meal]=id;
  document.getElementById("modal-meal").style.display="none";
  saveCalendar(); renderCalendar();
}

// ── 起動 ──────────────────────────────────────────────────────────────────

// PWA: インストールプロンプト
let _pwaPrompt = null;
window.addEventListener("beforeinstallprompt", function(e) {
  e.preventDefault();
  _pwaPrompt = e;
  const btn = document.getElementById("btn-pwa-install");
  if (btn) btn.style.display = "inline-flex";
});
window.addEventListener("appinstalled", function() {
  const btn = document.getElementById("btn-pwa-install");
  if (btn) btn.style.display = "none";
  toast("✅ ホーム画面に追加しました！");
});
window.doPWAInstall = async function() {
  if (_pwaPrompt) {
    _pwaPrompt.prompt();
    const result = await _pwaPrompt.userChoice;
    _pwaPrompt = null;
    if (result.outcome === "accepted") toast("✅ インストールしました！");
  } else {
    // iOS向けガイド
    alert("📱 iOSの場合:\nSafariで開き、「共有」→「ホーム画面に追加」をタップしてください。");
  }
};

// Service Worker 登録
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(function(){});
}

// ── 戻るボタン制御 ────────────────────────────────────────────────────────
// モーダルが開いているときだけ「戻る」ボタンを表示する
const MODAL_IDS = ["modal-detail","modal-form","modal-import","modal-export","modal-meal","modal-member","modal-site-editor"];
function updateBackBtn() {
  const anyOpen = MODAL_IDS.some(function(id){
    const el = document.getElementById(id);
    return el && el.style.display !== "none";
  });
  const btn = document.getElementById("btn-back");
  if (btn) btn.style.display = anyOpen ? "block" : "none";
}
window.goBack = function() {
  // 開いているモーダルを全部閉じる（z-indexが高いものから順に）
  var closed = false;
  // site-editorは最前面なので最初にチェック
  const se = document.getElementById("modal-site-editor");
  if (se && se.style.display !== "none") { se.style.display = "none"; updateBackBtn(); return; }
  MODAL_IDS.forEach(function(id) {
    const el = document.getElementById(id);
    if (!closed && el && el.style.display !== "none") {
      el.style.display = "none";
      closed = true;
    }
  });
  updateBackBtn();
};

// MutationObserverで全モーダルのdisplay変化を監視
(function() {
  var observer = new MutationObserver(updateBackBtn);
  function observeModals() {
    MODAL_IDS.forEach(function(id) {
      var el = document.getElementById(id);
      if (el) observer.observe(el, { attributes: true, attributeFilter: ["style"] });
    });
    // modal-site-editorは動的生成なので定期チェックも補完
    observer.observe(document.body, { childList: true });
  }
  // DOM構築後に実行
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", observeModals);
  } else {
    observeModals();
  }
})();

loadData();
</script>
